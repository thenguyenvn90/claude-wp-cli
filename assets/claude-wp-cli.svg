<path d="M831,262 l-12,-6 v12 z" fill="#FF7F00" opacity="0.7"/>
<text x="600" y="250" text-anchor="middle" font-size="11.5" fill="#94a3b8" class="l">REST API calls</text>
<g stroke="#10b981" stroke-width="1.6" fill="none" opacity="0.32"><use href="#f1"/><use href="#f2"/><use href="#f3"/></g>

<g class="l">
<rect x="95" y="120" width="230" height="64" rx="12" fill="#12233f" stroke="#2f4a73" stroke-width="1.4"/>
