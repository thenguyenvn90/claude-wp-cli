<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="claude-wp-cli: Claude Code on your machine translates natural-language prompts into CLI commands that call the WordPress REST API over the internet to manage posts and pages, the media library, and categories and tags on any WordPress site — no plugin, multi-site.">
<title>claude-wp-cli: manage WordPress from Claude Code via the REST API</title>
<defs>
<filter id="g" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3"/></filter>
<filter id="au" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="64"/></filter>
<radialGradient id="aO" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FF7F00" stop-opacity="0.30"/><stop offset="100%" stop-color="#FF7F00" stop-opacity="0"/></radialGradient>
<radialGradient id="aG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#10b981" stop-opacity="0.26"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/></radialGradient>
<radialGradient id="hubG" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#3b2a12"/><stop offset="100%" stop-color="#1a1407"/></radialGradient>
<style>.l{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}
.glow{animation:gl 2.4s ease-in-out infinite}@keyframes gl{0%,100%{opacity:0}50%{opacity:.9}}
@media (prefers-reduced-motion:reduce){.glow{animation:none}.dot{display:none}}</style>
</defs>

<rect width="1200" height="420" rx="18" fill="#0A1426"/>
<g filter="url(#au)"><ellipse cx="230" cy="230" rx="280" ry="180" fill="url(#aO)"/><ellipse cx="970" cy="240" rx="300" ry="190" fill="url(#aG)"/></g>

<text x="600" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="#F1F5F9" class="l">claude-wp-cli — manage WordPress from Claude Code</text>
<text x="600" y="62" text-anchor="middle" font-size="12.5" fill="#94a3b8" class="l">Natural-language prompts → WordPress REST API · no plugin · multi-site</text>

<g stroke="#33415c" stroke-width="1.2" stroke-dasharray="5 6" opacity="0.55"><line x1="415" y1="90" x2="415" y2="376"/><line x1="805" y1="90" x2="805" y2="376"/></g>
<g class="l" font-size="12.5" font-weight="700" fill="#cbd5e1" text-anchor="middle"><text x="210" y="100">Your Machine</text><text x="610" y="100">Internet</text><text x="1000" y="100">WordPress Site</text></g>

<defs>
