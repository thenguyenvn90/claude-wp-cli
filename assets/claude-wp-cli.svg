<use href="#down" stroke="#FF7F00" stroke-width="2" opacity="0.4"/>
<path d="M210,228 l-6,-12 h12 z" fill="#FF7F00" opacity="0.7"/>

<rect x="95" y="230" width="230" height="64" rx="12" fill="url(#hubG)" stroke="#FF7F00" stroke-width="2.2"/>
<rect x="95" y="230" width="230" height="64" rx="12" fill="none" stroke="#FF7F00" stroke-width="2.4" filter="url(#g)" class="glow"/>
<text x="210" y="261" text-anchor="middle" font-size="15" font-weight="800" fill="#FF9D33">claude-wp-cli</text>
<text x="210" y="281" text-anchor="middle" font-size="10.5" fill="#94a3b8">Python CLI tool</text>

<rect x="835" y="230" width="270" height="64" rx="12" fill="#0c2a22" stroke="#10b981" stroke-width="1.8"/>
<text x="970" y="261" text-anchor="middle" font-size="14" font-weight="800" fill="#34d399">WordPress REST API</text>
<text x="970" y="281" text-anchor="middle" font-size="10.5" fill="#94a3b8">core WP · Application Password</text>

