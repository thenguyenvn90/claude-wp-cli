<rect x="790" y="320" width="160" height="48" rx="10" fill="#0c2a22" stroke="#1f6f57" stroke-width="1.3"/><text x="870" y="349">Media Library</text>
<rect x="970" y="320" width="200" height="48" rx="10" fill="#0c2a22" stroke="#1f6f57" stroke-width="1.3"/><text x="1070" y="349">Categories &amp; Tags</text>
</g>
</g>

<g class="l" font-size="10.5" font-weight="600" text-anchor="middle">
<rect x="60" y="384" width="320" height="28" rx="8" fill="none" stroke="#FB9B3C" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.85"/>
<text x="220" y="402" fill="#FB9B3C">Works with ANY WordPress site — no plugin needed</text>
<rect x="820" y="384" width="320" height="28" rx="8" fill="none" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.85"/>
<text x="980" y="402" fill="#6ee7b7">Manage multiple sites from one setup</text>
</g>

<g fill="#FF9D33" filter="url(#g)" class="dot">
<circle r="5"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0s"><mpath href="#main"/></animateMotion></circle>
<circle r="5"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0.6s"><mpath href="#main"/></animateMotion></circle>
</g>
<g fill="#34d399" filter="url(#g)" class="dot">
